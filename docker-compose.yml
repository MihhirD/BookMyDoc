services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  backend:
    build: ./backend
    container_name: bookmydoc-backend
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/prescripto
    depends_on:
      - mongodb
    
  frontend:
    build: ./frontend
    container_name: bookmydoc-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: bookmydoc-admin
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mongodb-data: